name: StadiumPulse AI — CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend: lint + test suite (Firebase mocked, no credentials needed)
  # ──────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Jest Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        env:
          NODE_ENV: test
          DEMO_MODE: "true"
          # No real API keys needed — Firebase and AI are mocked in tests
        run: npm test -- --forceExit --testTimeout=15000

  # ──────────────────────────────────────────────────────────────────────────────
  # Frontend: dependency install + Vite production build
  # ──────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Vite Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (Vite)
        env:
          # Provide a dummy backend URL so the build does not fail on missing env
          VITE_BACKEND_URL: http://localhost:4000
        run: npm run build
